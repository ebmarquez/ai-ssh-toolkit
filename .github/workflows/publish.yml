name: Publish

on:
  release:
    types: [created]

jobs:
  publish-npm:
    name: Publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write  # Required for OIDC / Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN needed — OIDC handles authentication

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required for GitHub Packages
      id-token: write  # Required for provenance (publishConfig.provenance=true in package.json)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ebmarquez'

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add scoped name for GitHub Packages
        run: |
          # GitHub Packages requires a scoped name (@owner/package)
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@ebmarquez/ai-ssh-toolkit';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
